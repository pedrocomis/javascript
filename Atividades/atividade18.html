<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade18</title>
    <link rel="stylesheet" href="../CSS/style18.css">
</head>
<body>
    <h1>Atividade 18</h1>
    <p>Atividade de multiplicação</p>
    <input type="text" name="" id="nome" placeholder="Digite o seu nome:">
    <input type="text" name="" id="num1" placeholder="Digite o primeiro número:">
    <input type="text" name="" id="num2" placeholder="Digite o segundo número:">
    <input type="text" name="" id="num3" placeholder="Digite o terceiro número:">
    <button onclick="enviar()">Enviar</button>
    <p id="resultado"></p>
    <script>
        function enviar(){
            let nome = document.getElementById("nome").value;
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            let num3 = parseFloat(document.getElementById("num3").value);
            let resultado = num1 * num2 * num3;
            document.getElementById("resultado").innerHTML = "Olá " + nome + ", o resultado da multiplicação é: " + resultado;
        }
    </script>
</body>
</html>
