<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Var + console</title>
</head>
<body>
    <h1>Exemplo Var + console</h1><!--Titulo-->
    <script>//JavaScript Inline
      var idade = window.prompt("digite sua idade:");//Window.prompt serve para interagir com o usuario
      alert("Idade digitado é: "+ idade);//tambem pode ser usado para mostrar o resultado sem o ctrl+j
         ou 
      <!--console.log("Idade digitado é: ",idade);-->//Mostrar o resultado no console aperte ctrl+j para ver   
    </script>
</body>
</html>
