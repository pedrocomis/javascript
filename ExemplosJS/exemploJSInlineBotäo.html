<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Botäo</title>
</head>
<body>
    <h1>Olá Mundo</h1>
    <p>Clique no botäo para ver uma mensagem:</p>
    <button onclick="mostrarmensagem()">Clique aqui</button>
    <script>
        function mostrarmensagem(){
            window.alert ("Olá estou aprendendo Java Script ");
        }
    </script>
</body>
</html>
