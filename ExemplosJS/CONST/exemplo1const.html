<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo Const</title>
    
</head>
<body>
    <h1>Exemplo com Const</h1>
    <p>o nome do sistema e fixo(const)</p>

    <label for="">Digite seu nome:</label>
    <input type="text" id="nome">
    <button onclick="mostrar()">mostrar</button>
    <p id="resultado"></p>
    <script>
        //constante que não altera
        const sistema = "Sistema Escolar";
        //função do botão
        function mostrar(){
            //valor digitado ele pode mudar
            let nome = document.getElementById("nome").value;
            //mostrando na tela
            document.getElementById("resultado").innerHTML = "bem-vindo " + nome + " ao " + sistema;
        }
    </script>
</body>
</html>
